name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go test ./...
      - run: go build -o bin/spine ./cmd/spine
      - run: scripts/smoke_archive.sh
      - run: scripts/smoke_mcp.sh
      - run: scripts/smoke_http.sh
