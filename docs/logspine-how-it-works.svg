<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">How Logspine works</title>
  <desc id="desc">Flowchart showing adapter records entering Logspine, being imported into SQLite, indexed, searched, and emitted as evidence.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      text { font-family: DejaVu Sans, Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .title { font-weight: 700; font-size: 28px; fill: #0f172a; }
      .label { font-weight: 700; font-size: 16px; fill: #0f172a; }
      .small { font-weight: 400; font-size: 13px; fill: #334155; }
      .box { stroke: #334155; stroke-width: 2; rx: 10; }
      .input { fill: #e0f2fe; }
      .process { fill: #fef3c7; }
      .store { fill: #dcfce7; }
      .output { fill: #ede9fe; }
      .line { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1120" height="560" fill="#ffffff"/>
  <text x="48" y="52" class="title">How Logspine Works</text>

  <rect x="48" y="110" width="214" height="236" class="box input"/>
  <text x="155" y="144" text-anchor="middle" class="label">Adapter Sources</text>
  <text x="74" y="186" class="small">AgentTrail</text>
  <text x="74" y="218" class="small">SourceHarvest</text>
  <text x="74" y="250" class="small">Native compatibility</text>
  <text x="74" y="282" class="small">Piped adapter JSONL</text>
  <text x="74" y="314" class="small">Fixture and test data</text>

  <rect x="338" y="112" width="190" height="94" class="box process"/>
  <text x="433" y="146" text-anchor="middle" class="label">Import</text>
  <text x="433" y="170" text-anchor="middle" class="small">parse and validate</text>
  <text x="433" y="190" text-anchor="middle" class="small">logspine.adapter.v1</text>

  <rect x="338" y="260" width="190" height="96" class="box process"/>
  <text x="433" y="294" text-anchor="middle" class="label">Normalize</text>
  <text x="433" y="318" text-anchor="middle" class="small">dedupe, raw refs,</text>
  <text x="433" y="338" text-anchor="middle" class="small">tags, actors, relations</text>

  <rect x="606" y="110" width="204" height="118" class="box store"/>
  <text x="708" y="146" text-anchor="middle" class="label">SQLite Archive</text>
  <text x="708" y="170" text-anchor="middle" class="small">items, sources,</text>
  <text x="708" y="190" text-anchor="middle" class="small">collections, imports,</text>
  <text x="708" y="210" text-anchor="middle" class="small">scan manifests</text>

  <rect x="606" y="282" width="204" height="98" class="box store"/>
  <text x="708" y="316" text-anchor="middle" class="label">Index and Relate</text>
  <text x="708" y="340" text-anchor="middle" class="small">FTS5 search index</text>
  <text x="708" y="360" text-anchor="middle" class="small">relation backfill</text>

  <rect x="886" y="106" width="186" height="278" class="box output"/>
  <text x="979" y="140" text-anchor="middle" class="label">Reader Surfaces</text>
  <text x="912" y="182" class="small">search</text>
  <text x="912" y="214" class="small">show</text>
  <text x="912" y="246" class="small">explain</text>
  <text x="912" y="278" class="small">evidence bundles</text>
  <text x="912" y="310" class="small">Markdown export</text>
  <text x="912" y="342" class="small">HTTP and MCP</text>

  <rect x="338" y="424" width="472" height="82" class="box store"/>
  <text x="574" y="456" text-anchor="middle" class="label">Local Evidence Boundary</text>
  <text x="574" y="480" text-anchor="middle" class="small">Imported text is stored locally and treated as untrusted evidence.</text>
  <text x="574" y="500" text-anchor="middle" class="small">Logspine does not crawl external services.</text>

  <path d="M 262 228 L 338 159" class="line"/>
  <path d="M 433 206 L 433 260" class="line"/>
  <path d="M 528 308 L 606 169" class="line"/>
  <path d="M 708 228 L 708 282" class="line"/>
  <path d="M 810 331 L 886 246" class="line"/>
  <path d="M 574 424 L 708 380" class="dash"/>
</svg>
